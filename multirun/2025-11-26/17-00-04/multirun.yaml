hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - +test=glob("/dss/dsshome1/0F/go29van4/Workspace/sbto/sbto/tasks/g1/robot-object/*")
  job:
    name: main
    chdir: null
    override_dirname: +test=glob("/dss/dsshome1/0F/go29van4/Workspace/sbto/sbto/tasks/g1/robot-object/*")
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /dss/dsshome1/0F/go29van4/Workspace/sbto
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /dss/dsshome1/0F/go29van4/Workspace/sbto/sbto/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      solver: cem
      task: g1/gait
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
task:
  _target_: sbto.tasks.g1.gait.G1Gait
  cfg:
    _target_: sbto.tasks.g1.gait.ConfigG1Gait
    v_des:
    - 0.5
    - 0.0
    - 0.0
    stance_ratio:
    - 0.55
    - 0.55
    phase_offset:
    - 0.5
    - 0.0
    nominal_period: 0.9
    joint_pos_weight: 0.0
    joint_pos_weight_terminal: 10.0
    joint_vel_weight: 0.01
    joint_vel_lower_mult: 0.1
    torso_height_weight: 1.0
    torso_height_weight_terminal: 2000.0
    torso_xy_weight: 10.0
    torso_xy_weight_terminal: 300.0
    torso_linvel_weight:
    - 2.0
    - 2.0
    - 1.0
    torso_linvel_weight_terminal:
    - 10.0
    - 10.0
    - 40.0
    torso_angvel_weight: 1.0
    torso_angvel_weight_terminal: 10.0
    torso_quat_weight: 0.01
    torso_quat_weight_terminal: 50.0
    contact_weight: 10.0
    contact_weight_term: 10.0
    contact_force_weight: 1.0e-05
    u_weight_default: 1.0
    u_weight_hip_knee_scale: 0.1
    u_weight_upperbody_scale: 3.0
    u_torques: 1.0e-05
  sim:
    _target_: sbto.sim.sim_mj_rollout.SimMjRollout
    cfg:
      _target_: sbto.sim.sim_mj_rollout.ConfigMjRollout
      T: 200
      Nknots: 15
      keyframe_x0: knees_bent_wrist_yaw_90deg
      interp_kind: quadratic
      Nthread: 20
      _chunk_size: 2
    scaling:
      _target_: sbto.sim.action_scaling.Scaling
      name: nominal
      clip: true
    mj_scene:
      _target_: sbto.sim.scene_mj.MjScene
      cfg:
        _target_: sbto.sim.scene_mj.ConfigMjScene
        xml_scene_path: sbto/models/unitree_g1/scene_mjx_25dof_no_hands.xml
        xml_sensors_path: sbto/models/unitree_g1/sensors/default.xml
        xml_keyframes_path: sbto/models/unitree_g1/keyframes/g1_25dof.xml
        xml_contact_pairs_path: sbto/models/unitree_g1/contact_pairs/minimal.xml
solver:
  _target_: sbto.solvers.cem.CEM
  cfg:
    _target_: sbto.solvers.cem.ConfigCEM
    N_samples: 1024
    N_it: 100
    elite_frac: 0.05
    keep_frac: 0.0
    alpha_mean: 0.95
    alpha_cov: 0.15
    std_incr: 0.0
    sigma0: 0.25
    quasi_random: true
    seed: 0
    sampler: normal
description: ''
save_fig: true
init_knots_from_ref: false
warm_start:
  rundir: ''
  add_cov_diag: 0.0
  N_it: 0
  multiple_shooting: false
  incremental: false
  N_max_incr: 50
  min_std_next: 0.04
