hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - task=g1/robot_object_ref
    - init_knots_from_ref=True
    - solver=cem
    - warm_start.incremental=True
    - solver.cfg.alpha_cov=0.25
    - solver.cfg.alpha_mean=0.95
    - solver.cfg.sigma0=0.25
    - solver.cfg.N_it=0
    - task.sim.cfg.interp_kind=pchip
    - solver.cfg.keep_frac=0.05
    - task.cfg.ref_motion_path=sbto/tasks/g1/robot-object/*original.npz
  job:
    name: main
    chdir: null
    override_dirname: init_knots_from_ref=True,solver.cfg.N_it=0,solver.cfg.alpha_cov=0.25,solver.cfg.alpha_mean=0.95,solver.cfg.keep_frac=0.05,solver.cfg.sigma0=0.25,solver=cem,task.cfg.ref_motion_path=sbto/tasks/g1/robot-object/*original.npz,task.sim.cfg.interp_kind=pchip,task=g1/robot_object_ref,warm_start.incremental=True
    id: '0'
    num: 0
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /dss/dsshome1/0F/go29van4/Workspace/sbto
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /dss/dsshome1/0F/go29van4/Workspace/sbto/sbto/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /dss/dsshome1/0F/go29van4/Workspace/sbto/multirun/2025-11-26/17-02-33/0
    choices:
      solver: cem
      task: g1/robot_object_ref
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
